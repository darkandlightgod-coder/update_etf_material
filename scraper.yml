name: Run Yuanta Scraper

on:
  # 1. 每天定時自動執行 (UTC時間 01:00，等於台灣時間 09:00)
  schedule:
    - cron: '0 1 * * *' 
  
  # 2. 允許在 GitHub 頁面「手動點擊」執行 (這就是您要的相容性)
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright gspread oauth2client
          playwright install chromium

      - name: Run Scraper
        env:
          # 這裡確保了您的 Secret 會被傳入環境變數中
          GSPREAD_JSON: ${{ secrets.GSPREAD_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          python yuanta_ratio_scraper.py
